apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: user-kbourbon
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: user-kbourbon
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: "Loan API"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: user-kbourbon
data:
  loan_api.json: |
    {
      "title": "Loan Approval API",
      "uid": "loan-api",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(http_requests_total{handler=\"/predict\"}[1m])",
              "legendFormat": "{{method}} {{status_code}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Approval Rate (%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "rate(loan_predictions_total{result=\"approved\"}[5m]) / rate(loan_predictions_total[5m]) * 100",
              "legendFormat": "Approval rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          }
        },
        {
          "id": 3,
          "title": "Predictions (approved vs rejected)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "rate(loan_predictions_total[5m])",
              "legendFormat": "{{result}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Prediction Probability Distribution",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(loan_prediction_probability_bucket[5m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.9, rate(loan_prediction_probability_bucket[5m]))",
              "legendFormat": "p90"
            },
            {
              "expr": "histogram_quantile(0.99, rate(loan_prediction_probability_bucket[5m]))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 5,
          "title": "API Latency (p50 / p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(http_request_duration_seconds_bucket{handler=\"/predict\"}[1m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{handler=\"/predict\"}[1m]))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 6,
          "title": "Prediction Errors",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "increase(loan_prediction_errors_total[1h])",
              "legendFormat": "Errors (last 1h)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          }
        },
        {
          "id": 7,
          "title": "Rolling Approval Rate (last 100 predictions)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "loan_approval_rate * 100",
              "legendFormat": "Approval rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "red",    "value": 0  },
                  { "color": "yellow", "value": 30 },
                  { "color": "green",  "value": 60 }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 8,
          "title": "Income Distribution (p50 / p90) — Data Drift",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 24 },
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(loan_request_income_bucket[5m]))",
              "legendFormat": "p50 income"
            },
            {
              "expr": "histogram_quantile(0.9, rate(loan_request_income_bucket[5m]))",
              "legendFormat": "p90 income"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "currencyUSD" } }
        },
        {
          "id": 9,
          "title": "Loan Amount Distribution (p50 / p90) — Data Drift",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(loan_request_amount_bucket[5m]))",
              "legendFormat": "p50 amount"
            },
            {
              "expr": "histogram_quantile(0.9, rate(loan_request_amount_bucket[5m]))",
              "legendFormat": "p90 amount"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "currencyUSD" } }
        },
        {
          "id": 10,
          "title": "LTI Ratio Distribution (p50 / p90) — Data Drift",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(loan_request_lti_ratio_bucket[5m]))",
              "legendFormat": "p50 LTI"
            },
            {
              "expr": "histogram_quantile(0.9, rate(loan_request_lti_ratio_bucket[5m]))",
              "legendFormat": "p90 LTI"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 } }
        },
        {
          "id": 11,
          "title": "Batch Request Size",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(loan_batch_size_bucket[5m]))",
              "legendFormat": "p50 batch size"
            },
            {
              "expr": "histogram_quantile(0.95, rate(loan_batch_size_bucket[5m]))",
              "legendFormat": "p95 batch size"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: user-kbourbon
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana-loan-api-user-kbourbon.user.lab.sspcloud.fr"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: user-kbourbon
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
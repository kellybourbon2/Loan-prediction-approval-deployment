name: Post-sync Healthcheck
on:
  push:
    branches: [main]
jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Wait for ArgoCD to sync
        run: sleep 60
      - name: Healthcheck
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ vars.API_URL }}/health" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Healthcheck failed — HTTP $STATUS"
            exit 1
          fi
      - name: Rollback on failure
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout HEAD~1 -- deployment/deployment.yaml
          git add deployment/deployment.yaml
          git commit -m "ci: rollback — healthcheck failed"
          git pull --rebase origin main
          git push origin HEAD:main
